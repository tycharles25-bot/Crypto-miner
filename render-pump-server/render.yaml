# Render Pump Server - PumpApi + pump detection for iOS app
# Deploy: Connect repo → New Blueprint → Select render-pump-server/render.yaml

services:
  - type: web
    name: render-pump-server
    runtime: node
    rootDir: render-pump-server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Required for holder filter (1–20 holders = new tokens)
      # SOLANA_RPC_URL, MIN_HOLDERS=1, MAX_HOLDERS=20
      # MIN_PUMP_PERCENT=50, MAX_PUMP_PERCENT=150
